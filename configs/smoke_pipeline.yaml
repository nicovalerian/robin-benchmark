# Smoke-test config: 100 samples, 2 models, all phases.
# Do NOT use for production runs — use full_config.yaml.

dataset:
  source: "ilhamfadheel/alpaca-cleaned-indonesian"
  target_size: 100
  random_seed: 42
  categories:
    logical_reasoning:
      weight: 0.25
      keywords: ["logika", "deduksi", "silogisme", "kesimpulan", "premis"]
    mathematical_reasoning:
      weight: 0.20
      keywords: ["hitung", "matematika", "rumus", "angka", "persamaan"]
    creative_writing:
      weight: 0.20
      keywords: ["cerita", "puisi", "narasi", "kreatif", "tulis"]
    information_extraction:
      weight: 0.20
      keywords: ["rangkum", "ekstrak", "informasi", "fakta", "data"]
    coding:
      weight: 0.15
      keywords: ["kode", "program", "fungsi", "algoritma", "python"]

constraints:
  types:
    - keyword
    - length
    - format
  keyword:
    min_keywords: 1
    max_keywords: 2
    sources:
      - response_based
      - task_specific
  length:
    types:
      - word_count
    ranges:
      short: [20, 50]
      medium: [50, 150]
      long: [150, 300]
  format:
    types:
      - json
      - numbered_list
      - bullet_list
      - table

perturbation:
  prompts_path: "configs/perturbation_prompts.yaml"
  llm:
    provider: "digitalocean"
    base_url: "https://inference.do-ai.run/v1/"
    model: "gemma-4-31B-it"
    api_key_env: "DIGITALOCEAN_INFERENCE_KEY"
    temperature: 0.4
    max_tokens: 1024
    max_concurrency: 20
    max_retries: 3
    rate_limit_per_minute: 120

inference:
  temperature: 0.0
  max_tokens: 1024
  top_p: 1.0
  timeout_seconds: 60
  max_retries: 3
  retry_delay: 2.0
  max_concurrent: 20
  rate_limit_per_minute: 100
  models:
    - name: "gemma-4-31b"
      provider: "digitalocean"
      model_id: "gemma-4-31B-it"
    - name: "mistral-3-14b"
      provider: "digitalocean"
      model_id: "mistral-3-14B"

evaluation:
  constraint_checker:
    enabled: true
    strict_mode: true
  semantic_scorer:
    enabled: true
    metrics:
      - rouge_l
      - bert_score
    bert_model: "indobenchmark/indobert-base-p1"
  output:
    format: ["json"]
    save_intermediate: true

analysis:
  pdr:
    baseline_level: 0
    metrics: ["constraint_pass_rate", "semantic_score", "judge_rating"]
  skill_map:
    enabled: true
    dimensions:
      - category
      - constraint
      - model
      - level
  visualization:
    radar_chart: true
    heatmap: true
    export_format: ["png", "pdf", "html"]

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_output: "data/output"
  results: "results"
  logs: "logs"
