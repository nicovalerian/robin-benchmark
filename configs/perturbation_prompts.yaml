# =============================================================================
# ROBIN Perturbation Prompts (Phase 1)
# =============================================================================
# Used by src/phase1/perturbation_engine.py to generate four linguistic
# variants (L0-L3) of every base instruction via DigitalOcean Serverless
# Inference.
#
# Design principles (ROBIN paper, Sec. III-A, Table II):
#   1. Semantic core MUST be preserved: the user must be asking for the
#      exact same thing after rewriting.
#   2. Constraints are evaluation metadata only — they do NOT appear in
#      the prompt. Do NOT add "Jawab dalam X kata" or "Pastikan mengandung
#      kata: X" sentences.
#   3. Only surface linguistic form changes between levels.
#   4. Output is one line of plain text. No commentary, no markdown.
#
# Post-processing (applied after LLM output):
#   L2: Indonesian discourse particles added if absent.
#   L3: IndoCollex word substitutions + discourse particles + random lowercase.
# =============================================================================

shared:
  system: |
    You are a linguistics-aware Indonesian text rewriter for the ROBIN
    benchmark, which stress-tests LLM instruction-following under
    Indonesian-English code-mixing.

    Your job is to rewrite a single Indonesian instruction into a target
    perturbation level while obeying these inviolable rules:

    CRITICAL RULES (never break):
    R1. PRESERVE THE EXACT SEMANTIC INTENT: The rewritten prompt MUST ask for the exact same task. Do not add, remove, or alter the core request.
    R2. DO NOT ADD NEW CONSTRAINTS: Never add instructions like "in descending order", "based on the text", or "using a numbered list" unless they are explicitly present in the original prompt. Do not change the difficulty of the prompt.
    R3. NO METADATA: If you see hidden constraints (e.g., "Jawab dalam X kata"), DO NOT include these in your rewrite. They are for background evaluation only.
    R4. OUTPUT FORMAT: Output ONLY the rewritten instruction on a single line of plain text. No commentary, no markdown, no quotes.

    Style discipline:
      - Stay natural — this should read like something a real Indonesian
        speaker would actually type or say.
      - Apply the level's mechanisms at a realistic density, not on
        every single token.

  output_format: |
    Return ONLY the rewritten instruction. No preface, no quotes,
    no trailing notes.

# -----------------------------------------------------------------------------
# Level 0 — Formal Indonesian (Control)
# -----------------------------------------------------------------------------
level_0:
  name: "Formal Indonesian"
  user: |
    LEVEL: L0 — Formal Indonesian (control baseline).

    Rewrite the instruction below into clean, formal Bahasa Indonesia
    (Bahasa baku). Replace any English word, slang, or informal token
    with its standard Indonesian equivalent.

    CRITICAL: Do NOT change the core request.

    INSTRUCTION:
    """
    {instruction}
    """

# -----------------------------------------------------------------------------
# Level 1 — Lexical Borrowing
# -----------------------------------------------------------------------------
# Absorbed English content words (nouns + bare-form verbs) that educated
# Indonesian speakers use without morphological change.
# Paper ref: "Level-1, Lexical Borrowing, introduces absorbed English nouns
# common in everyday Indonesian speech without any grammatical or
# morphological changes."


level_1:
  name: "Lexical Borrowing"
  user: |
    LEVEL: L1 — Lexical Borrowing.

    Rewrite the instruction by replacing 2-4 Indonesian content nouns with
    their commonly absorbed English equivalents. L1 is purely nominal
    borrowing — only nouns change, nothing else.


    MANDATORY RULE: The output MUST NOT be an exact match of the input. You MUST make at least 2 noun swaps.


      Allowed noun swaps (Indonesian → absorbed English form):

        Document / text structure:
          teks → text, kalimat → sentence, paragraf → paragraph,
          kata → word, judul → title, bagian → section,
          daftar → list, tabel → table, poin → point,
          ringkasan → summary, draf → draft, catatan → note,
          gambar → figure, referensi → reference

        Information & content:
          topik → topic, konten → content, konteks → context,
          kategori → category, detail → detail, label → label,
          tag → tag, indeks → index, versi → version,
          fitur → feature, tipe → type, pola → pattern

        Process & output:
          proses → process, hasil → result, keluaran → output,
          masukan → input, tanggapan → response, permintaan → request,
          langkah → step, metode → method, solusi → solution,
          laporan → report, ulasan → review, pembaruan → update

        Technology & coding:
          sistem → system, berkas → file, basis data → database,
          peladen → server, antarmuka → interface, pustaka → library,
          modul → module, templat → template, kode → code,
          kesalahan → error, kelas → class, objek → object,
          larik → array, kueri → query, pengguna → user

        Academic / reasoning:
          nilai → value, bukti → evidence, argumen → argument,
          tujuan → objective, struktur → structure, model → model,
          grafik → graph, diagram → chart, skema → schema

    Rules:
    1. PRIORITY SWAPS: Always try to swap nouns from the primary list above first.
    2. OUT-OF-LIST ALLOWANCE: If the instruction does not contain enough words from the primary list to meet the 1-2 swap quota, you MAY swap other relevant Indonesian nouns into their common English corporate/tech forms (e.g., produk -> product, perusahaan -> company).
    3. EXTREME FALLBACK: If the instruction is extremely short and has NO nouns at all, you may swap ONE verb into its bare English form (e.g., gunakan -> use, hitung -> calculate) to ensure the output is not an exact match.
    4. Do NOT apply Indonesian affixes to the English words (e.g., no "di-review").
    5. Do NOT add slang, particles (sih, dong), or typos.

    INSTRUCTION:
    """
    {instruction}
    """

# -----------------------------------------------------------------------------
# Level 2 — Morphological Fusion
# -----------------------------------------------------------------------------
# L1 + Indonesian affixes on English verb stems + English discourse
# markers/connectors as fillers.
# Paper ref: "Level-2, Morphological Fusion, attaches Indonesian affixes to
# English verb stems (e.g., direview, diupload) and inserts English discourse
# markers as fillers (e.g., basically)."
level_2:
  name: "Morphological Fusion"
  user: |
    LEVEL: L2 — Morphological Fusion (Jaksel register).

    Start from a natural L1-style instruction, You MUST apply BOTH of these two layers:

    (a) MANDATORY MECHANISM 1 (MORPHOLOGICAL FUSION): 
        You MUST attach an Indonesian affix (di-, me-, nge-, -nya) to at least ONE English verb root. You cannot just use English words; you MUST fuse them with Indonesian grammar. If there is no English verb, translate one Indonesian verb into English and add the affix.
          Examples: extract  → diextract / mengextract
          display  → didisplay
          upload   → diupload
          share    → di-share / nge-share
          review   → direview
          generate → digenerate
          analyze  → dianalisis

    (b) ENGLISH DISCOURSE MARKERS / CONNECTORS — a Jaksel speaker
        naturally drops an English connector where Indonesian discourse
        would use "yang", "karena", "supaya", or a pause. Insert 1-2
        connectors that fit the sentence position:

        Mid-clause relatives:  which, that
        Causal/purposive:      so that, because
        Contrastive/additive:  actually, I mean
        Filler/hedge:          basically, like, literally, by the way

        Each connector suits different positions — pick the one that
        sounds natural for THIS instruction, not the same word each time.

    Do NOT switch whole clauses to English (that is L3).
    Do NOT add slang abbreviations like "gak", "gue", "lo" (that is L3).
    Do NOT add typos.


    INSTRUCTION:
    """
    {instruction}
    """

# -----------------------------------------------------------------------------
# Level 3 — Intra-Sentential Switching
# -----------------------------------------------------------------------------
# L2 + clause-level language alternation + English suffixes on Indonesian
# roots + Indonesian phonological respelling of English words.
# Paper ref: "Level-3 ... extends the Morphological Fusion level further with
# clause-level language alternation, English suffixes on Indonesian roots
# (e.g., jujurly), and Indonesian phonological spelling of English words
# (e.g., nais, krezi)."
# Note: IndoCollex word substitutions and discourse particles are applied
# by post-processing after this LLM call.
level_3:
  name: "Intra-Sentential Switching"
  user: |
    LEVEL: L3 — Intra-Sentential Switching (most extreme Jaksel).

    Start from an L2-style instruction, then apply ALL THREE mechanisms
    below in the SAME rewrite.

    (a) MANDATORY MECHANISM 1 (CLAUSE-LEVEL SWITCHING): 
      Flip at least one full clause into
        English. The English clause should be the part that a Jaksel
        speaker would most naturally say in English given the instruction
        topic — it could be a purpose clause, a manner clause, a relative
        clause, or a result clause. Generate it naturally; do not copy
        a fixed template.

    (b) MANDATORY MECHANISM 2 (PHONOLOGICAL RESPELLING): 
      Insert one English discourse word, written with Indonesian phonotactics, naturally into the sentence.
        This is how Jaksel speakers write English fillers — they spell
        them as they sound in Indonesian. Insert the respelled word as
        a sentence opener, mid-clause filler, or manner adverb.

        Choose based on what fits the sentence naturally:
          please  → plis    (polite opener: "Plis buatkan...")
          really  → rili    (emphatic filler: "yang rili harus...")
          literally → litereli  (intensifier: "yang litereli perlu...")
          make    → meik    (manner: "meik sure hasilnya...")
          right   → rait    (confirmation: "rait, jadi...")
          check   → cek     (action filler: "cek dulu apakah...")
          great   → greit   (opener: "greit, sekarang...")

        Pick whichever fits the sentence's tone and position. This word
        MUST appear in the output — it is always possible to add one.

    (c) MANDATORY MECHANISM 3 (ID-ROOT + EN-SUFFIX): 
      Take an Indonesian adjective or adverb
        that describes the quality or manner the instruction demands,
        and attach the English suffix -ly (adverbial) or -ness (nominal).
        Do NOT use a fixed word — derive one from the instruction's own
        semantic content. Ask: what quality does this instruction call
        for? Use that Indonesian root. The pattern: [ID-root] + [-ly/-ness].

    All three mechanisms (a), (b), (c) MUST appear in the output.
    The instruction must remain answerable and semantically intact.
    WARNING (CRITICAL RULE): DO NOT ADD NEW CONSTRAINTS. Do not add rules like "in descending order", "based on the text", or "explain it thoroughly". Only apply these three linguistic mechanisms to the EXISTING meaning of the prompt.


    INSTRUCTION:
    """
    {instruction}
    """
