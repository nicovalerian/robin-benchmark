# =============================================================================
# ROBIN Perturbation Prompts (Phase 1)
# =============================================================================
# Used by src/phase1/perturbation_engine.py to generate four linguistic
# variants (L0-L3) of every base instruction via DigitalOcean Serverless
# Inference.
#
# Design principles (ROBIN paper, Sec. III-A, Table II):
#   1. Semantic core MUST be preserved: the user must be asking for the
#      exact same thing after rewriting.
#   2. Verifiable constraints ARE embedded in the instruction text (lines
#      starting with "Gunakan format", "Jawab dalam", "Pastikan jawaban",
#      "Tampilkan jawaban"). Copy them VERBATIM — never code-mix them.
#   3. Only surface linguistic form changes between levels.
#   4. Output is plain text. No commentary, no markdown.
#
# Post-processing (applied after LLM output):
#   L2: Indonesian discourse particles added if absent.
#   L3: IndoCollex word substitutions + discourse particles + random lowercase.
# =============================================================================

shared:
  system: |
    You are a linguistics-aware Indonesian text rewriter for the ROBIN
    benchmark, which stress-tests LLM instruction-following under
    Indonesian-English code-mixing.

    Your job is to rewrite a single Indonesian instruction into a target
    perturbation level while obeying these inviolable rules:

    CRITICAL RULES (never break):
    R1. PRESERVE THE EXACT SEMANTIC INTENT: The rewritten prompt MUST ask for the exact same task. Do not add, remove, or alter the core request.
    R2. DO NOT ADD NEW CONSTRAINTS: Never add instructions like "in descending order", "based on the text", or "using a numbered list" unless they are explicitly present in the original prompt. Do not change the difficulty of the prompt.
    R3. CONSTRAINT PRESERVATION: The instruction may end with verifiable constraint lines ("Gunakan format ...", "Jawab dalam X–Y kata.", "Pastikan jawaban mengandung kata: X.", "Tampilkan jawaban ..."). You MUST:
        (a) Copy these lines VERBATIM at the very end of your rewrite — do not translate, paraphrase, abbreviate, or code-mix them in any way.
        (b) Do NOT write any version of these lines anywhere else in the rewrite. Do not embed a transformed, abbreviated, or Jaksel version of them in the instruction body. The constraint lines must appear EXACTLY ONCE, at the end, unchanged.
    R4. OUTPUT FORMAT: Output ONLY the rewritten instruction on a single line of plain text. No commentary, no markdown, no quotes.
    R5. DO NOT CARRY OVER INPUT TEXT (e.g. Chinese characters, code snippets, quotes passages) into the rewrite unless they are an inseparable part of the instruction itself. Rewrite only the instruction frame around them.
    R6. IF THE ORIGINAL INSTRUCTION IS A SINGLE SHORT IMPERATIVE WITH NO CONTENT NOUNS (e.g. "Terjemahkan kalimat ini"), a one-sentence rewrite is sufficient -- do not pad with extra clauses. 

    Style discipline:
      - Stay natural — this should read like something a real Indonesian
        speaker would actually type or say.
      - Apply the level's mechanisms at a realistic density, not on
        every single token.

  output_format: |
    Return ONLY the rewritten instruction. No preface, no quotes,
    no trailing notes.

# -----------------------------------------------------------------------------
# Level 0 — Formal Indonesian (Control)
# -----------------------------------------------------------------------------
level_0:
  name: "Formal Indonesian"
  user: |
    LEVEL: L0 — Formal Indonesian (control baseline).

    Rewrite the instruction below into clean, formal Bahasa Indonesia
    (Bahasa baku). Replace any English word, slang, or informal token
    with its standard Indonesian equivalent.

    CRITICAL: Do NOT change the core request.

    EXAMPLE:
    Input: "Tolong check file laporan ini secepatnya ya."
    Output: "Mohon periksa berkas laporan ini secepatnya."

    FINAL REMINDER: The output must be completely formal Bahasa Indonesia with absolutely no English words or casual slang.

    INSTRUCTION:
    """
    {instruction}
    """

# -----------------------------------------------------------------------------
# Level 1 — Lexical Borrowing
# -----------------------------------------------------------------------------
level_1:
  name: "Lexical Borrowing"
  user: |
    LEVEL: L1 — Lexical Borrowing.

    Rewrite the instruction by replacing 1-2 Indonesian content nouns with their commonly absorbed English corporate/tech equivalents. 

    MANDATORY RULE: You MUST make at least 1 noun swap from the list below. If the instruction genuinely contains none of these nouns AND has no paraphrasable content noun, output the instruction unchanged - do not force an artificial swap.
    
    Primary noun swaps (Indonesian -> absorbed English form):
      - teks -> text, kalimat -> sentence, paragraf -> paragraph, kata -> word
      - daftar -> list, ringkasan -> summary, topik -> topic, konten -> content
      - proses -> process, hasil -> result, masukan -> input, keluaran -> output
      - sistem -> system, pengguna -> user, basis data -> database
      - nilai -> value, bukti -> evidence, model -> model

    Rules:
    1. PRIORITY SWAPS: Always try to swap nouns from the primary list above first.
    2. OUT-OF-LIST ALLOWANCE: If the instruction does not contain enough words from the primary list to meet the 1-2 swap quota, you MAY swap other relevant Indonesian nouns into their common English corporate/tech forms (e.g., produk -> product, perusahaan -> company).
    3. Do NOT apply Indonesian affixes to the English words (e.g., no "di-review").
    4. Do NOT add slang, particles (sih, dong), or typos.

    EXAMPLE:
    Input: "Sistem membutuhkan masukan dari pengguna sebelum memproses data."
    Output: "System membutuhkan input dari user sebelum memproses data."

    FINAL REMINDER: Only swap 1-2 NOUNS into English. Do not add English verbs, affixes, or informal slang.

    INSTRUCTION:
    """
    {instruction}
    """

# -----------------------------------------------------------------------------
# Level 2 — Morphological Fusion
# -----------------------------------------------------------------------------
level_2:
  name: "Morphological Fusion"
  user: |
    LEVEL: L2 — Morphological Fusion (Jaksel register).

    You will receive the ORIGINAL instruction. Produce an L2-style rewrite directly. You MUST apply BOTH of these two layers:

    (a) MANDATORY MECHANISM 1 (MORPHOLOGICAL FUSION): 
        You MUST attach an Indonesian affix (di-, me-, nge-, -nya) to at least ONE English verb root. You cannot just use English words; you MUST fuse them with Indonesian grammar. If there is no English verb, translate one Indonesian verb into English and add the affix. Use di- (passive) when the action is done TO something ("diextract", "diupload"), and me- (active) when the subject performs the action ("mengextract", "mengupdate").
          Examples: extract  → diextract / mengextract
          display  → didisplay
          upload   → diupload
          share    → di-share / nge-share
          review   → direview

    (b) ENGLISH DISCOURSE MARKERS / CONNECTORS — a Jaksel speaker naturally drops an English connector where Indonesian discourse would use "yang", "karena", "supaya", or a pause. Insert 1-2 connectors that fit the sentence position:
        Mid-clause relatives:  which, that
        Causal/purposive:      so that, because
        Contrastive/additive:  actually, I mean
        Filler/hedge:          basically, like, literally, by the way

    Do NOT switch whole clauses to English (that is L3).
    Do NOT add slang abbreviations like "gak", "gue", "lo" (that is L3).

    EXAMPLE:
    Input: "Tolong periksa dokumen ini agar saya bisa mengirimkannya ke klien."
    Output: "Tolong direview dokumen ini, basically agar saya bisa mengirimkannya ke klien."

    FINAL REMINDER: Your output MUST contain at least one English verb fused with an Indonesian affix (e.g., di-review) AND at least one English connector (e.g., basically). 

    INSTRUCTION:
    """
    {instruction}
    """

# -----------------------------------------------------------------------------
# Level 3 — Intra-Sentential Switching
# -----------------------------------------------------------------------------
level_3:
  name: "Intra-Sentential Switching"
  user: |
    LEVEL: L3 — Intra-Sentential Switching (most extreme Jaksel).

    Start from an L2-style instruction, then apply ALL THREE mechanisms below in the SAME rewrite.

    (a) MANDATORY MECHANISM 1 (CLAUSE-LEVEL SWITCHING): 
      Flip at least one full clause into English. The English clause should be the part that a Jaksel speaker would most naturally say in English given the instruction topic. Generate it naturally; do not copy a fixed template.

    (b) MANDATORY MECHANISM 2 (PHONOLOGICAL RESPELLING): 
      Insert one English discourse word, written with Indonesian phonotactics, naturally into the sentence.
        
        CRITICAL: DO NOT DEFAULT TO "PLIS". YOU MUST VARY YOUR SELECTION. Heavily favor action-oriented or descriptive respellings from the top of this list:
          check   → cek     (action filler: "cek dulu apakah...")
          update  → apdet   (action filler: "tolong apdet...")
          make    → meik    (manner: "meik sure hasilnya...")
          really  → rili    (emphatic filler: "yang rili harus...")
          literally → litereli  (intensifier: "yang litereli perlu...")
          okay    → oke     (agreement/opener: "oke, pastikan...")
          nice    → nais    (adjective/filler: "hasil yang nais...")
          right   → rait    (confirmation: "rait, jadi...")
          great   → greit   (opener: "greit, sekarang...")
          please  → plis    (USE RARELY - polite opener)

        Pick whichever fits the sentence's tone and position. This word MUST appear in the output.

    (c) MANDATORY MECHANISM 3 (ID-ROOT + EN-SUFFIX): 
      Take an Indonesian adjective or adverb that describes the quality or manner the instruction demands, and attach the English suffix -ly (adverbial) or -ness (nominal). The pattern: [ID-root] + [-ly/-ness].

    WARNING (CRITICAL RULE): DO NOT ADD NEW CONSTRAINTS. Only apply these three linguistic mechanisms to the EXISTING meaning of the prompt.

    WARNING (CONSTRAINT LINES): The instruction ends with formal Indonesian constraint lines ("Pastikan jawaban mengandung kata: X", "Jawab dalam X–Y kata", "Gunakan format ...", "Tampilkan jawaban ..."). Do NOT apply any L3 mechanisms to these lines. Do NOT write abbreviated or Jaksel versions of them (e.g. "jwb dlm", "pastiin", "pake format") anywhere in your output. Copy them unchanged at the very end.

    EXAMPLE:
    Input: "Pastikan pekerjaan ini selesai dengan cepat agar kita bisa mengevaluasi hasilnya besok."
    Output: "Oke, meik sure pekerjaan ini selesai cepatly so we can evaluate the results besok."

    FINAL REMINDER: You MUST include an English clause, an ID-root+EN-suffix (e.g., jujurly), and a phonological respelling. DO NOT default to 'plis'; strongly prefer words like 'cek', 'apdet', or 'meik'.

    INSTRUCTION:
    """
    {instruction}
    """