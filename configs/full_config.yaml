# ROBIN Benchmark - Full Configuration
# This file configures all phases of the benchmark pipeline

# =============================================================================
# Dataset Configuration (Phase 1)
# =============================================================================
dataset:
  # Primary source dataset (Indonesian Alpaca, cleaned)
  source: "ilhamfadheel/alpaca-cleaned-indonesian"

  # Target benchmark size: 750 base instructions × 4 perturbation levels = 3000 prompts
  target_size: 750
  
  # Seed for reproducibility
  random_seed: 42
  
  # Task categories with natural distribution weights
  categories:
    logical_reasoning:
      weight: 0.25
      keywords: ["logika", "deduksi", "silogisme", "kesimpulan", "premis"]
    mathematical_reasoning:
      weight: 0.20
      keywords: ["hitung", "matematika", "rumus", "angka", "persamaan"]
    creative_writing:
      weight: 0.20
      keywords: ["cerita", "puisi", "narasi", "kreatif", "tulis"]
    information_extraction:
      weight: 0.20
      keywords: ["rangkum", "ekstrak", "informasi", "fakta", "data"]
    coding:
      weight: 0.15
      keywords: ["kode", "program", "fungsi", "algoritma", "python"]

# =============================================================================
# Constraint Configuration
# =============================================================================
constraints:
  # Constraint types to inject (one per type per sample)
  types:
    - keyword  # Must include specific words
    - length   # Word count range
    - format   # Output format (JSON, numbered list, table, bullet list)

  # Keyword constraint settings
  keyword:
    min_keywords: 1
    max_keywords: 2
    sources:
      - response_based # Keywords from gold response (primary)
      - task_specific  # Category fallback only

  # Length constraint settings
  length:
    types:
      - word_count      # "Jawab dalam 50-100 kata"
    ranges:
      short: [20, 50]
      medium: [50, 150]
      long: [150, 300]

  # Format constraint settings
  format:
    types:
      - json            # "Jawab dalam format JSON."
      - numbered_list   # "Gunakan format daftar bernomor."
      - bullet_list     # "Gunakan format poin-poin."
      - table           # "Tampilkan jawaban dalam format tabel."

# =============================================================================
# Perturbation Configuration
# =============================================================================
perturbation:
  # All four levels are now generated by an LLM via DigitalOcean
  # Serverless Inference, using the prompts in
  # configs/perturbation_prompts.yaml.
  prompts_path: "configs/perturbation_prompts.yaml"
  llm:
    provider: "digitalocean"
    base_url: "https://inference.do-ai.run/v1/"
    model: "openai-gpt-5.4-mini"
    api_key_env: "DIGITALOCEAN_INFERENCE_KEY"
    temperature: 0.4
    max_concurrency: 20
    max_retries: 6
    rate_limit_per_minute: 120
  levels:
    0:
      name: "formal_indonesian"
      description: "Standard Bahasa Indonesia (control baseline)"
    1:
      name: "lexical_borrowing"
      description: "Absorbed English nouns + bare-form verbs"
    2:
      name: "morphological_fusion"
      description: "Indonesian affixes on English verb stems + EN connectors/discourse fillers"
    3:
      name: "intra_sentential_switching"
      description: "L2 + clause switching + ID-root EN-suffix + ID phonological respelling"

# =============================================================================
# Inference Configuration (Phase 2)
# =============================================================================
inference:
   # Generation parameters (deterministic)
   temperature: 0.0
   max_tokens: 512
   top_p: 1.0

   # Timeout and retry settings
   timeout_seconds: 60
   max_retries: 3
   retry_delay: 2.0

   # Concurrency - all models via DigitalOcean Serverless Inference
   max_concurrent: 20
   rate_limit_delay: 0.5

   # All models verified working as of 2026-04-28 via DO endpoint.
   # Full verified model list available in git history.
   models:
      - name: "gpt-5-nano"
        provider: "digitalocean"
        model_id: "openai-gpt-5-nano"

      - name: "gemma-4-31b"
        provider: "digitalocean"
        model_id: "gemma-4-31B-it"

      - name: "qwen3-32b"
        provider: "digitalocean"
        model_id: "alibaba-qwen3-32b"

      - name: "claude-haiku-4.5"
        provider: "digitalocean"
        model_id: "anthropic-claude-haiku-4.5"

      - name: "kimi-k2.5"
        provider: "digitalocean"
        model_id: "kimi-k2.5"

# =============================================================================
# Evaluation Configuration (Phase 3)
# =============================================================================
evaluation:
  # Stream A: Objective Constraint Checker
  constraint_checker:
    enabled: true
    strict_mode: true  # Exact match for keywords
    
  # Stream B: Semantic Fidelity
  semantic_scorer:
    enabled: true
    metrics:
      - rouge_l
      - bert_score
    bert_model: "indolem/indobert-base-uncased"
    
  # Stream C: LLM-as-Judge
  llm_judge:
    enabled: true
    model: "gemini-2.0-flash"
    rubric_template: "configs/rubric_template.yaml"
    rating_scale: [1, 2, 3, 4, 5]
    
  # Output settings
  output:
    format: ["json", "huggingface"]
    save_intermediate: true

# =============================================================================
# Analysis Configuration (Phase 4)
# =============================================================================
analysis:
  # Performance Drop Rate calculation
  pdr:
    baseline_level: 0  # Compare against clean Indonesian
    metrics: ["constraint_pass_rate", "semantic_score", "judge_rating"]
    
  # Fine-grained skill mapping
  skill_map:
    enabled: true
    dimensions:
      - category      # By task type
      - constraint    # By constraint type
      - model         # By model
      - level         # By perturbation level
      
  # Visualization
  visualization:
    radar_chart: true
    heatmap: true
    export_format: ["png", "pdf", "html"]

# =============================================================================
# Paths
# =============================================================================
paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  data_output: "data/output"
  results: "results"
  logs: "logs"
